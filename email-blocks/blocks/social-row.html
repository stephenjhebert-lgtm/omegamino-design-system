<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#141C29;">
  <tr>
    <td style="padding:12px 28px 20px;">

      <!-- Instagram -->
      <a href="https://www.instagram.com/HANDLE" target="_blank" style="text-decoration:none; display:inline-block;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td width="36" height="36" align="center" valign="middle" style="width:36px; height:36px; border-radius:6px; background-color:#C13584;">

              <!--<![endif]-->
                <img src="https://img.icons8.com/ios-glyphs/22/ffffff/instagram-new.png" alt="Instagram" width="20" height="20" style="display:inline-block; vertical-align:middle;"/>
              <!--[if !mso]><!-->
              </div>
              <!--<![endif]-->
            </td>
            <td style="padding-left:12px; font-family:'Courier New',Courier,monospace; font-size:13px; color:#8A9BB5; vertical-align:middle;">@HANDLE</td>

      </a>

    </td>
