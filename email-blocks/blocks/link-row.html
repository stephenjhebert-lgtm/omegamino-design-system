<!-- ═══════════════════════════════════════
     BLOCK: LINK ROW
     Customize: href URL, LINK TITLE, subtitle text
     Stack multiple rows by duplicating the inner <table> block.
     Add style="margin-bottom:10px;" to all but the last row's outer <table>.
════════════════════════════════════════ -->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#141C29;">
  <tr>
    <td style="padding:12px 28px 20px;">

      <!-- Row 1 -->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin-bottom:10px;">
        <tr>
          <td style="background-color:#0F1A2E; border-left:3px solid #1AACF0; border-radius:0 6px 6px 0; padding:14px 18px;">
            <a href="https://LINK-URL-HERE" target="_blank" style="text-decoration:none; display:block;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td style="font-family:'Trebuchet MS',Helvetica,Arial,sans-serif; font-size:16px; font-weight:bold; text-transform:uppercase; color:#F4F6FA; letter-spacing:2px;">LINK TITLE</td>
                  <td align="right" style="font-family:'Trebuchet MS',Helvetica,Arial,sans-serif; font-size:16px; font-weight:bold; color:#1AACF0; white-space:nowrap; padding-left:12px;">&#8594;</td>
                </tr>
              </table>
              <p style="font-family:Helvetica,Arial,sans-serif; font-size:14px; color:#8A9BB5; margin:3px 0 0 0;">Short description or call to action.</p>
            </a>
          </td>
        </tr>
      </table>

      <!-- Row 2 — duplicate pattern, remove margin-bottom on last row -->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr>
          <td style="background-color:#0F1A2E; border-left:3px solid #1AACF0; border-radius:0 6px 6px 0; padding:14px 18px;">
            <a href="https://LINK-URL-HERE" target="_blank" style="text-decoration:none; display:block;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td style="font-family:'Trebuchet MS',Helvetica,Arial,sans-serif; font-size:16px; font-weight:bold; text-transform:uppercase; color:#F4F6FA; letter-spacing:2px;">LINK TITLE</td>
                  <td align="right" style="font-family:'Trebuchet MS',Helvetica,Arial,sans-serif; font-size:16px; font-weight:bold; color:#1AACF0; white-space:nowrap; padding-left:12px;">&#8594;</td>
                </tr>
              </table>
              <p style="font-family:Helvetica,Arial,sans-serif; font-size:14px; color:#8A9BB5; margin:3px 0 0 0;">Short description or call to action.</p>
            </a>
          </td>
        </tr>
      </table>

    </td>
  </tr>
</table>
